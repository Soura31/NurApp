{% extends 'base.html' %}
{% block content %}
<div class="min-h-screen flex flex-col items-center justify-center text-center px-4">
  <div class="text-6xl mb-6"></div>

  <h1 class="text-[#c9a84c] text-2xl font-bold font-Cinzel mb-4">
    Pas de connexion
  </h1>

  <p class="text-gray-400 mb-8">
    Certaines fonctionnalites sont disponibles hors ligne
  </p>

  <div class="grid grid-cols-2 gap-4 w-full max-w-xs">
    <a href="/tasbih/"
       class="p-4 rounded-2xl text-center"
       style="background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3)">
      <div class="text-2xl mb-1"></div>
      <span class="text-[#c9a84c] text-sm">Tasbih</span>
    </a>
    <a href="/azkar/"
       class="p-4 rounded-2xl text-center"
       style="background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3)">
      <div class="text-2xl mb-1"></div>
      <span class="text-[#c9a84c] text-sm">Azkar</span>
    </a>
  </div>

  <button onclick="window.location.reload()"
          class="mt-8 px-6 py-3 rounded-xl font-bold text-[#080c10]"
          style="background: linear-gradient(135deg, #c9a84c, #f0c060)">
    Reessayer
  </button>
</div>
{% endblock %}
