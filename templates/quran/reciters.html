{% extends 'base.html' %}
{% block title %}Recitateurs du Coran{% endblock %}
{% block content %}
<section class="max-w-7xl mx-auto px-4 sm:px-6 py-10" data-aos="fade-up">
  <div class="flex flex-wrap items-center justify-between gap-3">
    <h1 class="font-cinzel text-4xl text-white">Grands recitateurs</h1>
    <a href="/quran/" class="px-4 py-2 rounded-xl border border-[#c9a84c]/40 text-[#c9a84c]">Retour au Coran</a>
  </div>
  <p class="text-[#8b949e] mt-3">Selection de recitateurs connus dans le monde.</p>

  <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 mt-8">
    {% for reciter in reciters %}
    <article class="rounded-2xl p-5 border border-[#c9a84c]/20 bg-[#161b22]">
      <div class="flex items-center gap-3">
        <div class="relative">
          <img
            src="{{ reciter.avatar }}"
            alt="{{ reciter.name }}"
            class="reciter-avatar h-14 w-14 rounded-full border-2 border-[#c9a84c]/60 object-cover shadow-[0_6px_20px_rgba(201,168,76,0.28)] bg-[#0d1117]"
            loading="lazy"
          >
          <span class="absolute -bottom-1 -right-1 h-4 w-4 rounded-full bg-[#1a6b4a] border border-[#c9a84c]/70"></span>
        </div>
        <div>
          <h2 class="text-white text-lg font-semibold leading-tight">{{ reciter.name }}</h2>
          <p class="text-[#8b949e] text-sm mt-1">{{ reciter.country }}</p>
        </div>
      </div>
    </article>
    {% endfor %}
  </div>
</section>
{% endblock %}
